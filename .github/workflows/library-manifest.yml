name: Rebuild studio library manifest
on:
  push:
    branches: [main]
    paths:
      - 'docs/studio/library/**'
      - '!docs/studio/library/manifest.json'
jobs:
  manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/build_library_manifest.py
      - name: Commit manifest if changed
        run: |
          if ! git diff --quiet docs/studio/library/manifest.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/studio/library/manifest.json
            git commit -m "Rebuild studio library manifest"
            git push
          fi
