<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Studio | Print &amp; Craft Co.</title>
    <link rel="icon" type="image/png" href="/brand/n-icon.png">
    <style>
        :root {
            --text-dark: #111111;
            --text-light: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--text-dark); color: var(--text-light); min-height: 100vh; display: flex; flex-direction: column; }

        /* --- Nav (matches the rest of the site) --- */
        #mainNav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 5vw; background: var(--text-dark); position: relative; z-index: 10;
        }
        .nav-brand img { height: 35px; width: auto; display: block; }
        .nav-links { display: flex; gap: 2.5rem; position: absolute; left: 50%; transform: translateX(-50%); }
        .nav-links a { color: var(--text-light); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: opacity 0.2s; white-space: nowrap; }
        .nav-links a:hover { opacity: 0.65; }
        .cart-container { position: relative; display: flex; align-items: center; }
        .cart-icon { width: 22px; height: 22px; fill: none; stroke: var(--text-light); stroke-width: 1.5; }
        .cart-badge { position: absolute; top: -6px; right: -10px; background: #E93D3D; color: #fff; font-size: 11px; font-weight: 700; border-radius: 50%; min-width: 18px; height: 18px; display: flex; justify-content: center; align-items: center; }

        /* --- Studio box (matches shop design_studio) --- */
        .studio-section { flex: 1; padding: 40px 5vw 70px; text-align: center; }

        @keyframes pulseGlow {
            0%   { box-shadow: 0 0 30px rgba(200, 182, 255, 0.2); }
            50%  { box-shadow: 0 0 70px rgba(200, 182, 255, 0.6); }
            100% { box-shadow: 0 0 30px rgba(200, 182, 255, 0.2); }
        }
        .glowing-studio-wrapper {
            background: #1A1A1A; border-radius: 20px; border: 1px solid rgba(200, 182, 255, 0.3);
            width: 100%; max-width: 1400px; margin: 0 auto; height: 85vh; min-height: 700px;
            overflow: hidden; animation: pulseGlow 4s infinite ease-in-out;
        }
        .glowing-studio-wrapper iframe { width: 100%; height: 100%; border: none; display: block; }

        /* --- Footer (matches site) --- */
        footer { background: var(--text-dark); border-top: 1px solid #222; padding: 40px 5vw; text-align: center; }
        footer img { height: 34px; width: auto; margin-bottom: 12px; }
        footer p { color: #777; font-size: 13px; }
        footer a { color: #aaa; text-decoration: none; }

        @media (max-width: 820px) {
            .nav-links { display: none; }
            .studio-heading h1 { font-size: 1.8rem; }
            .glowing-studio-wrapper { height: 82vh; min-height: 560px; border-radius: 14px; }
        }
    </style>
</head>
<body>
    <nav id="mainNav">
        <a href="/" class="nav-brand">
            <img src="/brand/n-icon.svg" alt="Print &amp; Craft Co.">
        </a>
        <div class="nav-links">
            <a href="/studio">Creator Studio</a>
            <a href="/products/apparel">Apparel</a>
            <a href="/products/drinkware">Drinkware</a>
            <a href="/products/accessories">Accessories</a>
            <a href="/products/print">Prints</a>
            <a href="/products">All Products</a>
            <a href="/about_us">About Us</a>
        </div>
        <a href="https://shop.printncraftco.com/cart" class="cart-container">
            <svg class="cart-icon" viewBox="0 0 24 24">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span class="cart-badge">0</span>
        </a>
    </nav>

    <section class="studio-section">
        <div class="glowing-studio-wrapper">
            <iframe id="studioFrame" src="app/" allowfullscreen="true" title="Print &amp; Craft Co. Creator Studio"></iframe>
        </div>
    </section>

    <footer>
        <a href="/"><img src="/brand/logo-landscape.svg" alt="Print &amp; Craft Co."></a>
        <p>&copy; Print &amp; Craft Co. — Crafted by you.</p>
    </footer>

    <script>
        // Pass an ?order=PNC-XXXX param through to the studio app (change requests)
        var params = window.location.search;
        if (params) {
            document.getElementById('studioFrame').src = 'app/' + params;
        }
    </script>
<script src="/cart-badge.js" defer></script>
</body>
</html>
